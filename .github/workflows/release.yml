name: 自动发布 Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0, v2.1.3 等标签时触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21' # 根据你的项目需求调整版本
          distribution: 'temurin'

      - name: 赋予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 执行编译任务
        run: ./gradlew createFullJarRelease

      - name: 创建 GitHub Release 并上传 JAR
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/libs/*.jar # 请确认你的 JAR 包生成路径在此目录下
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
